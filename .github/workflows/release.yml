name: Release

# Triggers on any tag that starts with "v" (e.g. v0.2.0)
# Push a tag with: git tag -a v0.2.0 -m "Release v0.2.0" && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

# Required for tauri-action to create/update GitHub releases
permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (arm64 + x86_64 in one .dmg)
          - label: macOS universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin

          # Windows x64
          - label: Windows x64
            os: windows-latest
            rust-targets: ''
            args: ''

          # Linux x64
          - label: Linux x64
            os: ubuntu-22.04
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Rust build cache — saves ~5 min on subsequent runs
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux only: install WebKit2GTK and other native deps required by Tauri 2
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Build and upload to a GitHub release (created as draft)
      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing & notarization ──────────────────────────────
          # Set these secrets in: GitHub repo → Settings → Secrets → Actions
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DBC Studio ${{ github.ref_name }}
          releaseDraft: true      # stays draft until you manually publish
          prerelease: false
          args: ${{ matrix.args }}
